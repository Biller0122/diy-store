<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier QR</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; font-family: sans-serif; }
  .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,.12); text-align: center; }
  h2 { margin: 0 0 8px; font-size: 18px; color: #333; }
  p { margin: 16px 0 0; color: #666; font-size: 13px; word-break: break-all; }
  #qr { display: inline-block; padding: 12px; background: #fff; }
  .dev { margin-top: 12px; color: #b45309; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <h2>Supplier Login</h2>
  <div id="qr"></div>
  <p id="url"></p>
  <div class="dev">Dev only: URL-ийг <code>?url=...</code> query-ээр солино.</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const value = params.get('url') || 'https://shoptool.mn/supplier/login';
  document.getElementById('url').textContent = value;
  new QRCode(document.getElementById('qr'), { text: value, width: 300, height: 300 });
</script>
</body>
</html>
