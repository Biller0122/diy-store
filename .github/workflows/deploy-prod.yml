name: Deploy Production

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'progress.md'
      - 'prod/**'
  workflow_dispatch:
    inputs:
      deploy_server:
        description: Force deploy the backend server
        required: false
        type: boolean
        default: false
      deploy_web:
        description: Force deploy all web portals
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'diy-store-prod' }}
  SERVER_SERVICE: ${{ vars.SERVER_SERVICE || 'diy-store-server' }}
  CUSTOMER_WEB_SERVICE: ${{ vars.CUSTOMER_WEB_SERVICE || 'diy-store-web-customer' }}
  ADMIN_WEB_SERVICE: ${{ vars.ADMIN_WEB_SERVICE || 'diy-store-web-admin' }}
  DRIVER_WEB_SERVICE: ${{ vars.DRIVER_WEB_SERVICE || 'diy-store-web-driver' }}
  MERCHANT_WEB_SERVICE: ${{ vars.MERCHANT_WEB_SERVICE || 'diy-store-web-merchant' }}
  SERVER_ECR_REPOSITORY: ${{ vars.SERVER_ECR_REPOSITORY || 'diy-store-server' }}
  WEB_ECR_REPOSITORY: ${{ vars.WEB_ECR_REPOSITORY || 'diy-store-web' }}
  SERVER_CONTAINER_NAME: ${{ vars.SERVER_CONTAINER_NAME || 'server' }}
  WEB_CONTAINER_NAME: ${{ vars.WEB_CONTAINER_NAME || 'web' }}
  PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL || 'http://diy-store-alb-418459496.ap-southeast-1.elb.amazonaws.com' }}
  NEXT_PUBLIC_SOCKET_URL: ${{ vars.NEXT_PUBLIC_SOCKET_URL || '' }}
  GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID || '' }}

jobs:
  detect-changes:
    name: Detect deploy targets
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.detect.outputs.server }}
      web: ${{ steps.detect.outputs.web }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed deployable areas
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          server=false
          web=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            server="${{ github.event.inputs.deploy_server || 'false' }}"
            web="${{ github.event.inputs.deploy_web || 'false' }}"
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref_name }}" == "dev" ]]; then
              echo "Dev branch push: deploy backend and web for AWS validation."
              server=true
              web=true
              echo "server=$server" >> "$GITHUB_OUTPUT"
              echo "web=$web" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            base="${{ github.event.before }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="HEAD~1"
            fi

            changed="$(git diff --name-only "$base" HEAD)"
            echo "$changed"

            if echo "$changed" | grep -Eq '^(apps/server/|apps/server\.Dockerfile|package\.json|package-lock\.json|turbo\.json)'; then
              server=true
            fi

            if echo "$changed" | grep -Eq '^(apps/web/|package\.json|package-lock\.json|turbo\.json)'; then
              web=true
            fi

            if echo "$changed" | grep -Eq '^(packages/)'; then
              server=true
              web=true
            fi
          fi

          echo "server=$server" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"

  deploy:
    name: Build images and update ECS
    runs-on: ubuntu-latest
    needs: detect-changes
    environment: production
    if: needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.web == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        if: needs.detect-changes.outputs.server == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.ecr.outputs.registry }}/${SERVER_ECR_REPOSITORY}:${GITHUB_SHA}"
          docker build -f apps/server/Dockerfile -t "$image" .
          docker push "$image"
          echo "SERVER_IMAGE=$image" >> "$GITHUB_ENV"

      - name: Build and push web image
        if: needs.detect-changes.outputs.web == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.ecr.outputs.registry }}/${WEB_ECR_REPOSITORY}:${GITHUB_SHA}"
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_VENDURE_SHOP_API=/shop-api \
            --build-arg NEXT_PUBLIC_VENDURE_ADMIN_API=/admin-api \
            --build-arg NEXT_PUBLIC_SITE_URL="$PRODUCTION_BASE_URL" \
            --build-arg NEXT_PUBLIC_SOCKET_URL="$NEXT_PUBLIC_SOCKET_URL" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            --build-arg INTERNAL_VENDURE_SHOP_API="$PRODUCTION_BASE_URL/shop-api" \
            --build-arg INTERNAL_VENDURE_ADMIN_API="$PRODUCTION_BASE_URL/admin-api" \
            --build-arg INTERNAL_VENDURE_ASSETS="$PRODUCTION_BASE_URL/assets/:path*" \
            --build-arg INTERNAL_VENDURE_MAILBOX="$PRODUCTION_BASE_URL/mailbox/:path*" \
            -t "$image" .
          docker push "$image"
          echo "WEB_IMAGE=$image" >> "$GITHUB_ENV"

      - name: Update ECS services
        shell: bash
        run: |
          set -euo pipefail

          update_service_image() {
            local service="$1"
            local image="$2"
            local preferred_container="$3"

            echo "Updating $service to $image"

            local current_task_definition
            current_task_definition="$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$service" \
              --query 'services[0].taskDefinition' \
              --output text)"

            aws ecs describe-task-definition \
              --task-definition "$current_task_definition" \
              --query taskDefinition > current-task-definition.json

            jq \
              --arg image "$image" \
              --arg preferredContainer "$preferred_container" \
              --arg googleClientId "$GOOGLE_CLIENT_ID" \
              'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
              | .containerDefinitions |= (
                  if any(.name == $preferredContainer) then
                    map(if .name == $preferredContainer then .image = $image else . end)
                  else
                    .[0].image = $image | .
                  end
                )
              | .containerDefinitions |= (
                  if $googleClientId == "" then
                    .
                  else
                    map(
                      .environment = ((.environment // [])
                        | map(select(.name != "GOOGLE_CLIENT_ID" and .name != "NEXT_PUBLIC_GOOGLE_CLIENT_ID"))
                        + [
                          {"name":"GOOGLE_CLIENT_ID","value":$googleClientId},
                          {"name":"NEXT_PUBLIC_GOOGLE_CLIENT_ID","value":$googleClientId}
                        ])
                    )
                  end
                )' \
              current-task-definition.json > next-task-definition.json

            local next_task_definition
            next_task_definition="$(aws ecs register-task-definition \
              --cli-input-json file://next-task-definition.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)"

            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$service" \
              --task-definition "$next_task_definition" \
              --force-new-deployment > /dev/null

            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "$service"
          }

          if [[ "${{ needs.detect-changes.outputs.server }}" == "true" ]]; then
            update_service_image "$SERVER_SERVICE" "$SERVER_IMAGE" "$SERVER_CONTAINER_NAME"
          fi

          if [[ "${{ needs.detect-changes.outputs.web }}" == "true" ]]; then
            update_service_image "$CUSTOMER_WEB_SERVICE" "$WEB_IMAGE" "$WEB_CONTAINER_NAME"
            update_service_image "$ADMIN_WEB_SERVICE" "$WEB_IMAGE" "$WEB_CONTAINER_NAME"
            update_service_image "$DRIVER_WEB_SERVICE" "$WEB_IMAGE" "$WEB_CONTAINER_NAME"
            update_service_image "$MERCHANT_WEB_SERVICE" "$WEB_IMAGE" "$WEB_CONTAINER_NAME"
          fi

      - name: Smoke test production routes
        shell: bash
        run: |
          set -euo pipefail

          check_exact_200() {
            local path="$1"
            local code
            code="$(curl -sS -o /dev/null -w '%{http_code}' "$PRODUCTION_BASE_URL$path")"
            echo "$path -> $code"
            [[ "$code" == "200" ]]
          }

          check_not_5xx() {
            local path="$1"
            local code
            code="$(curl -sS -o /dev/null -w '%{http_code}' "$PRODUCTION_BASE_URL$path")"
            echo "$path -> $code"
            [[ "$code" != "000" && "$code" -lt 500 ]]
          }

          check_exact_200 /health
          check_not_5xx /shop-api
          check_not_5xx /
          check_not_5xx /admin
          check_not_5xx /driver
          check_not_5xx /supplier

  no-deploy-needed:
    name: No deploy needed
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server != 'true' && needs.detect-changes.outputs.web != 'true'
    steps:
      - name: Explain skip
        run: echo "No backend, web, package, or production build files changed."
