<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expo Go QR</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #1a1a2e; font-family: sans-serif; }
  .card { background: white; border-radius: 20px; padding: 36px 36px 28px; box-shadow: 0 8px 40px rgba(0,0,0,.4); text-align: center; }
  h2 { margin: 0 0 4px; font-size: 20px; color: #333; font-weight: 700; }
  .sub { margin: 0 0 20px; color: #888; font-size: 13px; }
  p { margin: 16px 0 0; color: #555; font-size: 12px; word-break: break-all; background: #f5f5f5; padding: 8px 12px; border-radius: 8px; }
  .tag { display: inline-block; background: #5c6bc0; color: white; font-size: 11px; padding: 2px 10px; border-radius: 20px; margin-bottom: 16px; }
  .dev { margin: 12px 0 0; color: #b45309; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <span class="tag">Expo Go</span>
  <h2>Supplier App</h2>
  <p class="sub">Expo Go апп-аар уншуулна уу</p>
  <div id="qr"></div>
  <p id="url"></p>
  <div class="dev">Dev only: өөрийн Expo URL-ийг <code>?url=...</code> query-ээр өгнө.</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const value = params.get('url') || 'exp://localhost:8081';
  document.getElementById('url').textContent = value;
  new QRCode(document.getElementById('qr'), { text: value, width: 300, height: 300 });
</script>
</body>
</html>
