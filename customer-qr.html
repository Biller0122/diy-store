<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIY Store — Хэрэглэгчийн апп</title>
<style>
  body { background: #08080E; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p { color: #888; font-size: 14px; margin: 0 0 28px; text-align: center; }
  #qr { background: #fff; padding: 16px; border-radius: 16px; }
  .url { margin-top: 20px; background: #1a1a24; border-radius: 10px; padding: 10px 18px; font-family: monospace; font-size: 13px; color: #7C9EFF; word-break: break-all; }
  .note { margin-top: 16px; font-size: 12px; color: #777; text-align: center; max-width: 360px; }
  .dev { margin-bottom: 12px; color: #FFB547; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<h1>DIY Store — Хэрэглэгч</h1>
<p>Expo Go апп-аар доорх QR-ийг уншуулна уу</p>
<div id="qr"></div>
<div class="url" id="url"></div>
<div class="dev">Dev only: өөрийн Expo URL-ийг <code>?url=...</code> query-ээр өгнө.</div>
<div class="note">URL-ийг <code>?url=exp://YOUR-LAN-IP:PORT</code> query-ээр өгч болно.</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const value = params.get('url') || 'exp://localhost:8083';
  document.getElementById('url').textContent = value;
  new QRCode(document.getElementById('qr'), {
    text: value,
    width: 260,
    height: 260,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });
</script>
</body>
</html>
