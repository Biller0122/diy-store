<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIY Store — Хэрэглэгчийн апп</title>
<style>
  body { background: #08080E; color: #fff; font-family: -apple-system, sans-serif;
         display: flex; flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p  { color: #888; font-size: 14px; margin: 0 0 28px; }
  #qr { background: #fff; padding: 16px; border-radius: 16px; }
  .url { margin-top: 20px; background: #1a1a24; border-radius: 10px; padding: 10px 18px;
         font-family: monospace; font-size: 13px; color: #7C9EFF; word-break: break-all; }
  .note { margin-top: 16px; font-size: 12px; color: #555; text-align: center; max-width: 320px; }
</style>
</head>
<body>
<h1>🛒 DIY Store — Хэрэглэгч</h1>
<p>Expo Go апп-аар доорх QR-ийг уншуулна уу</p>
<div id="qr"></div>
<div class="url">exp://192.168.0.13:8083</div>
<div class="note">Утас болон компьютер нэг Wi-Fi-д холбогдсон байх ёстой.<br>API: http://192.168.0.13:3001/shop-api</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById('qr'), {
    text: 'exp://192.168.0.13:8083',
    width: 260, height: 260,
    colorDark: '#000000', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
